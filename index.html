<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Prueba Realidad Aumentada TFM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body { font-family: Arial, sans-serif; margin: 0; text-align: center; background: #f5f5f5; }
    header { padding: 20px; background: #0066cc; color: white; }
    model-viewer { width: 100%; height: 65vh; background: #ffffff; }
    .contenido { padding: 20px; }
  </style>
</head>

<body>
  <header>
    <h1>Mi Bifaz Paleolítico en 3D</h1>
  </header>

  <model-viewer
    src="modelos/bifaz.glb"
    alt="Bifaz Paleolítico de prueba"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1">
  </model-viewer>

  <div class="contenido">
    <p>Si estás en el ordenador, puedes pinchar y arrastrar el bifaz para verlo por todos lados.</p>
    <p><strong>Si estás en el móvil, dale al botón de abajo a la derecha para proyectarlo en Realidad Aumentada.</strong></p>
  </div>
</body>
</html>
