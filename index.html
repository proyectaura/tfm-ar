<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Aula Virtual de Arqueología - Proyecto AR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    /* Estilos Globales - Paleta de colores Neo-Arqueológica */
    :root {
      --primary: #a0522d;       /* Terracota / Tierra */
      --primary-light: #f5f0eb; /* Arena claro para fondos */
      --dark: #2c3e50;          /* Grafito para textos principales */
      --grey: #7f8c8d;          /* Gris para secundarios */
      --white: #ffffff;
      --shadow: rgba(160, 82, 45, 0.15);
    }

    body { 
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; 
      margin: 0; 
      background-color: #faf8f5; 
      color: var(--dark);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Cabecera Profesional */
    header { 
      background: var(--white); 
      padding: 15px 20px; 
      box-shadow: 0 2px 15px rgba(0,0,0,0.05);
      border-bottom: 3px solid var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .logo-icono {
      background: var(--primary);
      color: var(--white);
      width: 35px;
      height: 35px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.2rem;
      box-shadow: 0 3px 6px rgba(160, 82, 45, 0.3);
    }

    header h1 { 
      margin: 0; 
      font-size: 1.4rem; 
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--dark);
    }

    .main-container {
      flex: 1;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      box-sizing: border-box;
      padding: 15px;
    }

    /* Selector de herramientas tipo "Pestañas Modernas" */
    .selector-piezas { 
      display: flex; 
      justify-content: space-between; 
      gap: 8px; 
      background: #eee6de; 
      padding: 6px;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    .btn-pieza { 
      flex: 1;
      padding: 12px 8px; 
      border: none; 
      border-radius: 8px; 
      background: transparent; 
      color: var(--dark); 
      font-weight: 600; 
      font-size: 0.85rem;
      cursor: pointer; 
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-pieza:hover {
      background: rgba(255,255,255,0.5);
    }

    .btn-pieza.activo { 
      background: var(--white); 
      color: var(--primary); 
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    /* Ventana del Visor 3D Estilo Galería de Museo */
    .contenedor-visor {
      background: var(--white);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px var(--shadow);
      border: 1px solid rgba(160, 82, 45, 0.1);
      margin-bottom: 20px;
      position: relative;
    }

    model-viewer { 
      width: 100%; 
      height: 40vh; 
      background-color: #fdfcfb;
    }

    /* Customización del botón nativo de Realidad Aumentada */
    model-viewer::part(ar-button) {
      background-color: var(--primary);
      border-radius: 30px;
      border: none;
      box-shadow: 0 4px 12px rgba(160, 82, 45, 0.4);
      color: var(--white);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      padding: 12px 20px;
      position: absolute;
      bottom: 16px;
      right: 16px;
      transform: scale(1.05);
      transition: background-color 0.2s;
    }

    /* Ficha Técnica / Textos Informativos */
    .ficha-tecnica { 
      text-align: left;
      background: var(--white);
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.02);
      border-left: 5px solid var(--primary);
      margin-bottom: 20px;
    }

    .ficha-tecnica h2 { 
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 1.4rem;
      color: var(--dark);
    }

    .descripcion { 
      font-size: 1rem; 
      line-height: 1.6; 
      color: #4a5568; 
      margin-bottom: 0;
    }

    /* Contenedor de Vídeo Adaptable (Ratio 16:9) */
    .contenedor-video {
      background: var(--white);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(0,0,0,0.03);
      border: 1px solid rgba(0,0,0,0.05);
      margin-bottom: 20px;
    }

    .video-titulo {
      padding: 12px 20px;
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
      background: #fdfcfb;
      border-bottom: 1px solid #eee;
      text-align: left;
    }

    .video-responsive {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
    }

    .video-responsive iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .guia-alumno {
      margin-top: 20px;
      padding: 12px;
      background: var(--primary-light);
      border-radius: 10px;
      font-size: 0.85rem;
      color: #6c543c;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 20px;
    }

    footer {
      padding: 15px;
      font-size: 0.8rem;
      color: var(--grey);
      background: #f1ede8;
      margin-top: auto;
      border-top: 1px solid #e1dad0;
    }
  </style>
</head>

<body>

  <header>
    <div class="logo-icono">🏛️</div>
    <h1>Laboratorio de Arqueología AR</h1>
  </header>

  <div class="main-container">

    <div class="selector-piezas">
      <button class="btn-pieza activo" onclick="cambiarModelo('modelos/bifaz.glb', 'Bifaz: La supervivencia nómada', 'Este bifaz de sílex tallado por las dos caras representa la vida nómada del Paleolítico. Las comunidades dependían de lo que cazaban y recolectaban
